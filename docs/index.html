<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloomdate</title>
<style>
  body { margin:0; background:#1D141A; color:#f2f2f2; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; box-sizing:border-box; }
  .wrap { max-width:560px; }
  h1 { font-size:2.2rem; margin-bottom:0.5rem; color:#B5568C; }
  p.tag { font-size:1.15rem; color:#cfcfcf; margin-bottom:2rem; }
  .feature { background:rgba(255,255,255,0.04); border:1px solid #3D2B3A44; border-radius:14px; padding:1rem 1.25rem; margin-bottom:0.75rem; text-align:left; }
  .feature b { color:#B5568C; }
  .cta { display:inline-block; margin-top:1.5rem; padding:0.8rem 1.6rem; background:#B5568C; color:#111; border-radius:999px; text-decoration:none; font-weight:600; }
  footer { margin-top:2.5rem; font-size:0.85rem; color:#888; }
  a { color:#3D2B3A; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #B5568C55 0%, #B5568C00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head><body>
<div class="orb"></div>
<div class="wrap">
  <h1>Bloomdate</h1>
  <p class="tag">Log first-bloom and last-bloom dates for perennials year over year.</p>
  <div class="feature"><b>Free:</b> Record bloom start/end dates per plant</div>
  <div class="feature"><b>Pro:</b> Multi-year bloom comparison charts and photo timeline</div>
  <a class="cta" href="#">Coming to the App Store</a>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms</a> &middot; s0533495227@gmail.com
  </footer>
</div>
</body></html>
